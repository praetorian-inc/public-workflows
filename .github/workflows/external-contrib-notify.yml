name: External Contribution Notify (Callable)
# Reusable workflow for praetorian-inc open-source repos. Detects external
# contributions (non-org-member PRs/Issues), creates a Linear issue, posts a
# Slack notification, and auto-replies on the GitHub thread.
#
# Access: this workflow is invocable from any repo in the praetorian-inc org
# (Settings -> Actions -> General -> Access -> Accessible from repositories in
# the 'praetorian-inc' organization).
#
# Caller example (.github/workflows/external-contribution.yml):
#
#   name: External Contribution Notify
#   on:
#     issues:
#       types: [opened, assigned, closed]
#     pull_request_target:
#       types: [opened, assigned, closed]
#   jobs:
#     notify:
#       uses: praetorian-inc/public-workflows/.github/workflows/external-contrib-notify.yml@<SHA>  # v2.0.x
#       permissions:
#         contents: read
#         issues: write
#         pull-requests: write
#       secrets:
#         EXTERNAL_CONTRIB_APP_ID: ${{ secrets.EXTERNAL_CONTRIB_APP_ID }}
#         EXTERNAL_CONTRIB_APP_PRIVATE_KEY: ${{ secrets.EXTERNAL_CONTRIB_APP_PRIVATE_KEY }}
#         LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
#         SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
#         LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
#         SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
#         LINEAR_ASSIGNEE_ID: ${{ secrets.LINEAR_ASSIGNEE_ID }}
#         LINEAR_PARENT_ISSUE_ID: ${{ secrets.LINEAR_PARENT_ISSUE_ID }}
#         LINEAR_PROJECT_ID: ${{ secrets.LINEAR_PROJECT_ID }}
#
# NOTE 1: The `permissions:` block on the caller job is REQUIRED. Without it,
# the reusable inherits the caller repo's default GITHUB_TOKEN permissions,
# which at the praetorian-inc org level is read-only
# (default_workflow_permissions: read). The reusable's own permissions block
# can only RESTRICT further — it cannot elevate beyond what the caller grants.
# Omitting the block causes 'Resource not accessible by integration' errors
# when the action tries to post PR/issue comments.
#
# NOTE 2: Prefer the explicit `secrets:` block above over `secrets: inherit`.
# `inherit` forwards every repo + org secret the caller has access to;
# explicit passing limits forwarding to only the 9 declared secrets, tightening
# blast radius if the reusable is ever misconfigured or compromised. Matters
# especially for a workflow running on pull_request_target (most sensitive
# trigger).
#
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations
#
# Required secrets (typically org-level, visibility scoped to the consumer repos):
#   - EXTERNAL_CONTRIB_APP_ID             (GitHub App ID / Client ID for praetorian-external-contrib-bot)
#   - EXTERNAL_CONTRIB_APP_PRIVATE_KEY    (App private key, PEM)
#   - LINEAR_API_KEY
#   - SLACK_BOT_TOKEN
#   - LINEAR_TEAM_ID                      (Linear team for created issues)
#   - SLACK_CHANNEL_ID                    (Slack channel for notifications)
#
# Optional secrets:
#   - LINEAR_ASSIGNEE_ID
#   - LINEAR_PARENT_ISSUE_ID
#
# Why secrets rather than inputs for per-repo config: GitHub Actions prohibits
# the `secrets` context in a reusable-workflow caller's `with:` block. Since
# consumer repos store these IDs as secrets today, the cleanest path is for the
# reusable to read them from `secrets.*` directly. Callers pass them through
# explicitly (preferred) or via `secrets: inherit` (broader blast radius).

on:
  workflow_call:
    inputs:
      linear-state-name:
        description: "Linear state name for created issues."
        required: false
        type: string
        default: "Backlog"
      github-org:
        description: "GitHub organization to check membership against."
        required: false
        type: string
        default: "praetorian-inc"
      dry-run:
        description: "Log payloads instead of sending (for testing)."
        required: false
        type: boolean
        default: false
      auto-reply-enabled:
        description: "Post auto-reply GitHub comments on external contributions."
        required: false
        type: boolean
        default: true

      enable-harden-runner:
        description: "Whether to install StepSecurity Harden-Runner as the first step of the job."
        required: false
        type: boolean
        default: true

      harden-runner-policy:
        description: "Harden-Runner egress policy: 'audit' (observe + report) or 'block' (deny by default)."
        required: false
        type: string
        default: "block"

      harden-runner-allowed-endpoints:
        description: "Newline-separated allowed egress endpoints when harden-runner-policy=block. Ignored in audit mode."
        required: false
        type: string
        default: >-
          api.github.com:443
          api.linear.app:443
          slack.com:443

    secrets:
      EXTERNAL_CONTRIB_APP_ID:
        description: "GitHub App ID (or Client ID) for praetorian-external-contrib-bot."
        required: true
      EXTERNAL_CONTRIB_APP_PRIVATE_KEY:
        description: "GitHub App private key (PEM)."
        required: true
      LINEAR_API_KEY:
        description: "Linear API key for issue creation."
        required: true
      SLACK_BOT_TOKEN:
        description: "Slack bot token for channel notifications."
        required: true
      LINEAR_TEAM_ID:
        description: "Linear team ID (UUID) that created issues are filed against."
        required: true
      SLACK_CHANNEL_ID:
        description: "Slack channel ID for the notification."
        required: true
      LINEAR_ASSIGNEE_ID:
        description: "Optional Linear user ID to assign created issues to."
        required: false
      LINEAR_PARENT_ISSUE_ID:
        description: "Optional Linear parent issue ID. Created issues become sub-issues."
        required: false
      LINEAR_PROJECT_ID:
        description: "Optional Linear project ID."
        required: false

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}

      - name: Run external-contrib-action
        uses: praetorian-inc/external-contrib-action@08e2bdbda0ab914fa00503b31a791a93213dc789  # v3.0.0
        with:
          linear-team-id: ${{ secrets.LINEAR_TEAM_ID }}
          linear-project-id: ${{ secrets.LINEAR_PROJECT_ID }}
          linear-assignee-id: ${{ secrets.LINEAR_ASSIGNEE_ID }}
          linear-parent-issue-id: ${{ secrets.LINEAR_PARENT_ISSUE_ID }}
          linear-state-name: ${{ inputs.linear-state-name }}
          slack-channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          github-org: ${{ inputs.github-org }}
          dry-run: ${{ inputs.dry-run }}
          auto-reply-enabled: ${{ inputs.auto-reply-enabled }}
          github-app-id: ${{ secrets.EXTERNAL_CONTRIB_APP_ID }}
          github-app-private-key: ${{ secrets.EXTERNAL_CONTRIB_APP_PRIVATE_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
