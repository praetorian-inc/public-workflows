name: Go CI (Callable)
# Reusable workflow for Go repositories in the praetorian-inc org.
# Consumers call this workflow to get consistent lint + test + build + runtime hardening
# without duplicating inline CI jobs per repo.
#
# Access: this workflow is invocable from any repo in the praetorian-inc org
# (Settings -> Actions -> General -> Access -> Accessible from repositories in
# the 'praetorian-inc' organization).
#
# Caller example:
#   jobs:
#     ci:
#       uses: praetorian-inc/public-workflows/.github/workflows/go-ci.yml@<SHA>  # v1.0.0
#       permissions:
#         contents: read
#       with:
#         golangci-lint-version: v2.11.4
#       secrets: inherit

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory for the Go module (useful for multi-module repos)."
        required: false
        type: string
        default: "."

      go-version-file:
        description: "Path to go.mod (relative to working-directory) used as Go version source of truth."
        required: false
        type: string
        default: "go.mod"

      enable-lint:
        description: "Whether to run golangci-lint. Set false for repos without a golangci config."
        required: false
        type: boolean
        default: true

      golangci-lint-version:
        description: "Pinned golangci-lint binary version. Use a specific version; never 'latest'."
        required: false
        type: string
        default: "v2.11.4"

      golangci-lint-timeout:
        description: "Timeout for golangci-lint run."
        required: false
        type: string
        default: "5m"

      enable-test:
        description: "Whether to run go test."
        required: false
        type: boolean
        default: true

      test-flags:
        description: "Flags passed to 'go test'. Defaults include race detector and coverage."
        required: false
        type: string
        default: "-race -coverprofile=coverage.out -covermode=atomic"

      test-packages:
        description: "Package selector passed to 'go test'."
        required: false
        type: string
        default: "./..."

      enable-build:
        description: "Whether to run the cross-platform build matrix."
        required: false
        type: boolean
        default: true

      build-matrix-os:
        description: "JSON array of GOOS values for the build matrix."
        required: false
        type: string
        default: '["linux","darwin","windows"]'

      build-matrix-arch:
        description: "JSON array of GOARCH values for the build matrix."
        required: false
        type: string
        default: '["amd64","arm64"]'

      build-cmd-path:
        description: "Go package path to build (e.g. ./cmd/augustus). Required if enable-build is true."
        required: false
        type: string
        default: ""

      build-binary-name:
        description: "Base name for the built binary. Defaults to the caller repo name."
        required: false
        type: string
        default: ""

      build-cgo-enabled:
        description: "CGO_ENABLED env value for the Build job. Default '0' produces static binaries and works with cross-compilation. Set '1' for packages with C bindings (e.g., go-tree-sitter, go-sqlite3). When '1', narrow build-matrix-os/arch to platforms with a C toolchain available on the runner (typically just linux/amd64) to avoid cross-compile failures."
        required: false
        type: string
        default: "0"

      enable-harden-runner:
        description: "Whether to install StepSecurity Harden-Runner as the first step of every job."
        required: false
        type: boolean
        default: true

      harden-runner-policy:
        description: "Harden-Runner egress policy: 'audit' (observe + report) or 'block' (deny by default)."
        required: false
        type: string
        default: "audit"

      harden-runner-allowed-endpoints:
        description: "Newline-separated allowed egress endpoints when harden-runner-policy=block. Ignored in audit mode. Recommended for block mode: proxy.golang.org:443, sum.golang.org:443, github.com:443, api.github.com:443, release-assets.githubusercontent.com:443, objects.githubusercontent.com:443, storage.googleapis.com:443. If upload-coverage: true, also add: cli.codecov.io:443, api.codecov.io:443, storage.googleapis.com:443."
        required: false
        type: string
        default: ""

      upload-coverage:
        description: "Whether to upload coverage.out to Codecov. Requires CODECOV_TOKEN secret."
        required: false
        type: boolean
        default: false

    secrets:
      CODECOV_TOKEN:
        description: "Codecov project token. Only required when upload-coverage is true."
        required: false

permissions:
  contents: read

jobs:
  # Preflight: skip CI entirely if the PR has no Go-relevant file changes.
  # Always runs on push-to-main, schedule, and workflow_dispatch (non-PR events).
  # Saves 3-5 min of runner time on docs/config-only PRs. Skipped jobs count
  # as passing for required status checks (unlike paths: filters which leave
  # checks stuck "Pending").
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      has_go: ${{ steps.check.outputs.has_go }}
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}

      - name: Check for Go changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          # Non-PR events (push to main, schedule, workflow_dispatch) always run.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
            echo "✓ Non-PR event (${{ github.event_name }}) — Go CI will run."
            exit 0
          fi

          FILES=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')

          echo "Changed files in PR ($(echo "$FILES" | wc -l | tr -d ' ') total):"
          echo "$FILES" | sed 's/^/  /'
          echo

          GO_RE='\.(go|mod|sum)$|^\.golangci|^Makefile$'
          if echo "$FILES" | grep -E "$GO_RE" | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
            echo "✓ Go changes detected — CI will run."
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "⊘ No Go changes — CI will be skipped."
          fi

  modcheck:
    name: Module integrity
    needs: preflight
    if: needs.preflight.outputs.has_go == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: ${{ inputs.working-directory }}/${{ inputs.go-version-file }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: go mod verify
        working-directory: ${{ inputs.working-directory }}
        run: go mod verify

      - name: go mod tidy drift check
        working-directory: ${{ inputs.working-directory }}
        run: |
          go mod tidy -diff
          # `go mod tidy -diff` prints the diff that would be applied and exits
          # non-zero if go.mod/go.sum are stale relative to the actual import graph.

  lint:
    name: Lint
    needs: preflight
    if: needs.preflight.outputs.has_go == 'true' && inputs.enable-lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: ${{ inputs.working-directory }}/${{ inputs.go-version-file }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: ${{ inputs.golangci-lint-version }}
          args: --timeout=${{ inputs.golangci-lint-timeout }}
          working-directory: ${{ inputs.working-directory }}

  test:
    name: Test
    needs: preflight
    if: needs.preflight.outputs.has_go == 'true' && inputs.enable-test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: ${{ inputs.working-directory }}/${{ inputs.go-version-file }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Download dependencies
        working-directory: ${{ inputs.working-directory }}
        run: go mod download

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: go test ${{ inputs.test-flags }} ${{ inputs.test-packages }}

      - name: Upload coverage
        if: ${{ inputs.upload-coverage && inputs.enable-test }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.working-directory }}/coverage.out

  build:
    name: Build
    needs: [preflight, test]
    if: needs.preflight.outputs.has_go == 'true' && inputs.enable-build && inputs.build-cmd-path != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        goos: ${{ fromJSON(inputs.build-matrix-os) }}
        goarch: ${{ fromJSON(inputs.build-matrix-arch) }}
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: ${{ inputs.working-directory }}/${{ inputs.go-version-file }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Determine binary name
        id: binary
        run: |
          if [ -n "${{ inputs.build-binary-name }}" ]; then
            echo "name=${{ inputs.build-binary-name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ inputs.build-cgo-enabled }}
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o "${{ steps.binary.outputs.name }}-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ${{ inputs.build-cmd-path }}
