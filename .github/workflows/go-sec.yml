name: Go Sec (Callable)
# Reusable workflow for Go repositories in the praetorian-inc org.
# Runs gosec (SAST) and govulncheck (Go vulnerability database) against the
# caller's module and optionally uploads SARIF to the GitHub Security tab.
#
# Access: invocable from any repo in the praetorian-inc org
# (Settings -> Actions -> General -> Access -> Accessible from repositories in
# the 'praetorian-inc' organization).
#
# Caller example (recommended placement: .github/workflows/security.yml):
#
#   name: Security
#   on:
#     push: { branches: [main] }
#     pull_request: { branches: [main] }
#     schedule:
#       - cron: '0 6 * * 1'  # Mondays 06:00 UTC
#     workflow_dispatch: {}
#
#   permissions:
#     contents: read
#
#   jobs:
#     security:
#       uses: praetorian-inc/public-workflows/.github/workflows/go-sec.yml@<SHA>  # vX.Y.Z
#       permissions:
#         contents: read
#         security-events: write  # gosec/govulncheck jobs statically declare it — grant even on private repos (else startup_failure)
#         actions: read           # gosec/govulncheck jobs statically declare it — grant even on private repos (else startup_failure)
#
# Posture (safe by default — a caller of ANY visibility can copy the block above verbatim):
#   - SARIF is uploaded to the Security tab ONLY on public repos (GitHub code scanning
#     is free there). On private/internal repos the upload is auto-skipped — no GitHub
#     Advanced Security required, and no false-red CI from a 403. The scan still runs;
#     findings print to the job log.
#   - A private/internal repo that HAS a GHAS license can opt back in with
#     `with: { force-upload-private: true }`.
#   - Scanning is observe-only by default (go-sec's historical posture). To make findings
#     FAIL the build — recommended on private/no-GHAS repos where the Security tab is
#     unavailable — pass `with: { fail-on-findings: true }`.
#   - Grant security-events:write + actions:read regardless of visibility: the jobs
#     statically declare them, so omitting them re-triggers a startup_failure even when
#     the upload is skipped at runtime.
#   - No `secrets: inherit` needed — this reusable only uses the auto-granted GITHUB_TOKEN.
#
# Design rationale: gosec+govulncheck live in their own reusable workflow
# (separate from go-ci.yml) because
#   (1) they need `security-events: write` which go-ci.yml callers don't grant,
#   (2) they typically run on a different cadence (weekly + on-push vs per-PR),
#   (3) a broken security tool should not block builds (independent blast radius).
# This matches the pattern used by kubernetes/release, ossf/scorecard,
# cli/cli, and prometheus/prometheus.
#
# Implementation note: gosec and govulncheck are installed via `go install`
# with pinned versions rather than via their respective GitHub Actions
# (securego/gosec, golang/govulncheck-action) because the praetorian-inc
# org restricts third-party actions to GitHub-owned, enterprise-owned, or
# allowlisted patterns. Pinned `go install` sidesteps the allowlist and
# still gives us deterministic, auditable tool versions.

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory for the Go module (useful for multi-module repos)."
        required: false
        type: string
        default: "."

      enable-gosec:
        description: "Whether to run gosec SAST scanner."
        required: false
        type: boolean
        default: true

      gosec-version:
        description: "Pinned gosec version (e.g. v2.22.11). Never use 'latest' — @latest has historically broken consumers when new gosec releases require newer Go than the CI toolchain provides."
        required: false
        type: string
        default: "v2.22.11"

      gosec-args:
        description: "Arguments passed to gosec. Defaults to observe-only (never fails the job) with SARIF output. Override to enforce: e.g. '-severity=high -fmt sarif -out gosec-results.sarif ./...'."
        required: false
        type: string
        default: "-no-fail -fmt sarif -out gosec-results.sarif ./..."

      enable-govulncheck:
        description: "Whether to run govulncheck against the module."
        required: false
        type: boolean
        default: true

      govulncheck-version:
        description: "Pinned govulncheck module version (golang.org/x/vuln/cmd/govulncheck@<version>)."
        required: false
        type: string
        default: "v1.1.4"

      govulncheck-package:
        description: "Go package selector passed to govulncheck."
        required: false
        type: string
        default: "./..."

      upload-sarif:
        description: "Whether to upload SARIF findings to the GitHub Security tab. Auto-skipped on non-public repos unless force-upload-private is set (GitHub code scanning requires GHAS on private/internal repos and 403s without it). When uploaded, the caller MUST grant both 'security-events: write' (to upload SARIF) AND 'actions: read' (for codeql-action/upload-sarif to fetch workflow run metadata). Missing 'actions: read' surfaces as 'Resource not accessible by integration' on the upload step even when the scan succeeds."
        required: false
        type: boolean
        default: true

      force-upload-private:
        description: "Upload SARIF even on private/internal repos. Requires a GitHub Advanced Security license on the repo (the upload step 403s without it). Default false: SARIF upload is auto-skipped on non-public repos so the scan runs clean without GHAS — findings surface in the job log, and fail-on-findings can gate the build."
        required: false
        type: boolean
        default: false

      fail-on-findings:
        description: "Fail the job on gosec findings or govulncheck vulnerabilities (exit-code gate). Default false (observe-only — go-sec's historical posture: findings surface via the Security tab on public repos and via the job log everywhere). Set true to enforce a red build on findings — recommended on private/internal repos without GHAS, where the Security tab is unavailable and the red build is the only finding surface."
        required: false
        type: boolean
        default: false

      enable-harden-runner:
        description: "Whether to install StepSecurity Harden-Runner as the first step of every job."
        required: false
        type: boolean
        default: true

      harden-runner-policy:
        description: "Harden-Runner egress policy: 'audit' (observe + report) or 'block' (deny by default)."
        required: false
        type: string
        default: "audit"

      harden-runner-allowed-endpoints:
        description: "Newline-separated allowed egress endpoints when harden-runner-policy=block. Ignored in audit mode. Recommended for block mode: proxy.golang.org:443, sum.golang.org:443, vuln.go.dev:443, github.com:443, api.github.com:443, release-assets.githubusercontent.com:443, objects.githubusercontent.com:443, storage.googleapis.com:443."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  # Preflight: skip security scanning if the PR has no Go-relevant changes.
  # Always runs on push-to-main, schedule, and workflow_dispatch — weekly
  # baseline scans should always execute regardless of file changes.
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_go: ${{ steps.check.outputs.has_go }}
      has_go_sources: ${{ steps.gosrc.outputs.has_go_sources }}
      visibility: ${{ steps.repo.outputs.visibility }}
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}
          disable-sudo-and-containers: true

      # Resolve repo visibility via the API (reliable on push/PR/schedule/dispatch,
      # unlike github.event.repository.visibility which is absent on some events).
      # Drives whether SARIF upload is attempted — never gates the scan itself.
      - name: Resolve repository visibility
        id: repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          VIS=$(gh api "repos/$REPO" --jq '.visibility' 2>/dev/null || echo "")
          [ -n "$VIS" ] || VIS="unknown"
          echo "visibility=$VIS" >> "$GITHUB_OUTPUT"
          echo "Repository visibility: $VIS"

      # Detect whether the repository contains ANY Go sources (go.mod or *.go),
      # anywhere in the tree — not just under working-directory. A repo with zero
      # Go (e.g. a freshly-created capability skeleton like nero) has nothing to
      # scan: gosec exits 1 with "No packages found" (which -no-fail does NOT
      # suppress) and govulncheck errors "no go.mod file". We skip both jobs
      # cleanly instead of red-failing. Whole-repo scope is deliberate: if Go
      # exists somewhere but NOT under working-directory, that is a
      # misconfiguration we must NOT mask — gosec is left to surface "No packages
      # found" there. Fail-safe: on any API error or a truncated tree we assume
      # Go is present and scan (never skip on uncertainty).
      - name: Detect Go sources in repository
        id: gosrc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -eu
          RESP=$(gh api "repos/$REPO/git/trees/$SHA?recursive=1" 2>/dev/null || echo "")
          if [ -z "$RESP" ]; then
            echo "has_go_sources=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not enumerate the repository tree — assuming Go sources are present and scanning."
            exit 0
          fi
          TRUNCATED=$(printf '%s' "$RESP" | jq -r '.truncated // false')
          GO_COUNT=$(printf '%s' "$RESP" | jq '[.tree[]? | select(.type=="blob") | select(.path | test("(^|/)go\\.mod$|\\.go$"))] | length')
          if [ "$TRUNCATED" = "true" ]; then
            echo "has_go_sources=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Repository tree was truncated by the API — assuming Go sources are present and scanning."
          elif [ "$GO_COUNT" -gt 0 ]; then
            echo "has_go_sources=true" >> "$GITHUB_OUTPUT"
            echo "✓ Repository contains Go sources ($GO_COUNT go.mod/*.go entries) — security scan will run."
          else
            echo "has_go_sources=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Go sources (go.mod or *.go) found anywhere in the repository — skipping gosec/govulncheck. The jobs pass; scanning resumes automatically once Go files are added."
          fi

      - name: Check for Go changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eu

          # Non-PR events (push to main, schedule, workflow_dispatch) always run.
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
            echo "✓ Non-PR event ($EVENT_NAME) — security scan will run."
            exit 0
          fi

          FILES=$(gh api \
            "repos/$REPO/pulls/$PR_NUMBER/files" \
            --paginate --jq '.[].filename')

          echo "Changed files in PR ($(echo "$FILES" | wc -l | tr -d ' ') total):"
          echo "$FILES" | sed 's/^/  /'
          echo

          GO_RE='\.(go|mod|sum)$|^\.golangci|^Makefile$'
          if echo "$FILES" | grep -E "$GO_RE" | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
            echo "✓ Go changes detected — security scan will run."
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "⊘ No Go changes — security scan will be skipped."
          fi

  gosec:
    name: Gosec
    needs: preflight
    if: needs.preflight.outputs.has_go == 'true' && needs.preflight.outputs.has_go_sources == 'true' && inputs.enable-gosec
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      # `codeql-action/upload-sarif` calls `GET /repos/{owner}/{repo}/actions/runs/{run_id}`
      # to attach SARIF findings to the triggering workflow run (and for telemetry).
      # Without `actions: read` the SARIF upload step errors with
      # "Resource not accessible by integration" and the gosec job fails,
      # even though the scan itself succeeded. See caligula/cato/florian
      # security.yml runs on 2026-04-19 for the failure signature.
      actions: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}
          disable-sudo-and-containers: true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          # Intentionally "stable" (not go-version-file): security scanners
          # should run against the latest Go toolchain for up-to-date vuln DB
          # and tool compatibility. go-ci.yml pins to go.mod for build fidelity.
          go-version: "stable"
          cache: false

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ inputs.gosec-version }}

      - name: Run gosec
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        env:
          GOSEC_ARGS: ${{ inputs.gosec-args }}
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        run: |
          ARGS="$GOSEC_ARGS"
          # When enforcing, strip -no-fail so gosec's non-zero exit on findings
          # gates the build (the SARIF file is still written first, so the
          # always() upload below still has a valid artifact on public repos).
          # When NOT enforcing, ARGS is passed through verbatim — preserving the
          # exit code a caller who removed -no-fail via gosec-args already relied on.
          if [ "$FAIL_ON_FINDINGS" = "true" ]; then
            ARGS="${ARGS//-no-fail/}"
          fi
          # shellcheck disable=SC2086
          gosec $ARGS

      # Announce (don't silently swallow) when upload is skipped on a non-public repo.
      - name: Note gosec SARIF upload skipped
        if: ${{ always() && inputs.upload-sarif && needs.preflight.outputs.visibility != 'public' && !inputs.force-upload-private }}
        env:
          VIS: ${{ needs.preflight.outputs.visibility }}
        run: |
          echo "::notice::gosec SARIF upload skipped — repository visibility is '$VIS' (not public; GitHub code scanning needs GHAS on private/internal repos). The scan ran and findings are in the job log above. Set fail-on-findings:true to gate the build on findings, or enable GHAS and pass with:{ force-upload-private: true } to upload to the Security tab."

      # Upload only when requested AND the repo can accept it: public repos (code
      # scanning is free) or a private repo that opted in via force-upload-private.
      # Prevents the GHAS 403 that turns a clean private-repo scan into a false-red.
      - name: Upload gosec SARIF
        if: ${{ always() && inputs.upload-sarif && (needs.preflight.outputs.visibility == 'public' || inputs.force-upload-private) }}
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          sarif_file: ${{ inputs.working-directory }}/gosec-results.sarif
          category: gosec

  govulncheck:
    name: Govulncheck
    needs: preflight
    if: needs.preflight.outputs.has_go == 'true' && needs.preflight.outputs.has_go_sources == 'true' && inputs.enable-govulncheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      # Required by `codeql-action/upload-sarif`. See gosec job above for rationale.
      actions: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}
          disable-sudo-and-containers: true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          # Intentionally "stable" — see gosec job above for rationale.
          go-version: "stable"
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ inputs.govulncheck-version }}

      # SARIF mode runs only when the result will actually be uploaded (public
      # repo, or private repo that opted in via force-upload-private). Otherwise
      # the text-mode step below runs instead — its findings surface in the log.
      - name: Run govulncheck (SARIF)
        if: ${{ inputs.upload-sarif && (needs.preflight.outputs.visibility == 'public' || inputs.force-upload-private) }}
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        env:
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        # govulncheck exits 0 on clean, 3 on vulns-found, other on error. Under
        # the default `bash -e` shell, exit 3 aborts the step mid-pipe and can
        # leave govulncheck-results.sarif empty or truncated; the subsequent
        # upload-sarif step (guarded by `always()`) then fails with
        # "Invalid SARIF. JSON syntax error: Unexpected end of JSON input".
        # We disable `-e`, tee stderr for debuggability, and fall back to a
        # minimal valid SARIF on malformed output so upload always succeeds.
        run: |
          set +e
          govulncheck -format sarif ${{ inputs.govulncheck-package }} > govulncheck-results.sarif 2> govulncheck-stderr.log
          EXIT=$?
          echo "govulncheck exit code: $EXIT"
          if [ -s govulncheck-stderr.log ]; then
            echo "::group::govulncheck stderr"
            cat govulncheck-stderr.log
            echo "::endgroup::"
          fi
          if [ ! -s govulncheck-results.sarif ] || ! python3 -c "import json,sys; json.load(open('govulncheck-results.sarif'))" 2>/dev/null; then
            echo "::warning::govulncheck did not produce valid SARIF (exit=$EXIT). Writing empty SARIF so upload succeeds."
            cat > govulncheck-results.sarif <<'SARIF_EOF'
          {
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "runs": []
          }
          SARIF_EOF
          fi
          # Gate on vulnerabilities (exit 3) only when enforcing. The SARIF file
          # is already written/validated above, so the always() upload below
          # still has a valid artifact even when we fail the step here.
          if [ "$FAIL_ON_FINDINGS" = "true" ] && [ "$EXIT" -eq 3 ]; then
            echo "::error::govulncheck found vulnerabilities (exit=3) and fail-on-findings is enabled."
            exit "$EXIT"
          fi
          # Propagate genuine tool errors (exit 1,2) — but treat "vulns found"
          # (exit 3) as success for CI purposes; findings surface via SARIF
          # upload to the GitHub Security tab. Keeps security scanning
          # non-blocking on build pipelines, per design rationale at top of file.
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 3 ]; then
            echo "::error::govulncheck tooling error (exit=$EXIT)"
            exit "$EXIT"
          fi

      # Text mode runs when SARIF won't be uploaded (private/internal repo without
      # GHAS, or upload-sarif:false). Findings print to the job log — the finding
      # surface when the Security tab is unavailable.
      - name: Run govulncheck (text)
        if: ${{ !(inputs.upload-sarif && (needs.preflight.outputs.visibility == 'public' || inputs.force-upload-private)) }}
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        env:
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        run: |
          set +e
          govulncheck ${{ inputs.govulncheck-package }}
          EXIT=$?
          echo "govulncheck exit code: $EXIT"
          # exit 3 = vulns found. Gate the build only when enforcing.
          if [ "$FAIL_ON_FINDINGS" = "true" ] && [ "$EXIT" -eq 3 ]; then
            echo "::error::govulncheck found vulnerabilities (exit=3) and fail-on-findings is enabled."
            exit "$EXIT"
          fi
          # Propagate genuine tool errors (not clean=0, not vulns=3).
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 3 ]; then
            exit "$EXIT"
          fi

      - name: Note govulncheck SARIF upload skipped
        if: ${{ always() && inputs.upload-sarif && needs.preflight.outputs.visibility != 'public' && !inputs.force-upload-private }}
        env:
          VIS: ${{ needs.preflight.outputs.visibility }}
        run: |
          echo "::notice::govulncheck SARIF upload skipped — repository visibility is '$VIS' (not public; GitHub code scanning needs GHAS on private/internal repos). govulncheck ran in text mode; findings are in the job log above. Set fail-on-findings:true to gate the build, or enable GHAS and pass with:{ force-upload-private: true }."

      - name: Upload govulncheck SARIF
        if: ${{ always() && inputs.upload-sarif && (needs.preflight.outputs.visibility == 'public' || inputs.force-upload-private) }}
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          sarif_file: ${{ inputs.working-directory }}/govulncheck-results.sarif
          category: govulncheck
