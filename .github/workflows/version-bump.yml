name: Version Bump (Callable)

# Post-merge version bump. Callers trigger on `push: branches: [main]`.
# Each merge to main gets a unique version — no collision between concurrent PRs.
# Old callers pinned to earlier SHAs still get the PR-open behavior from that SHA.

on:
  workflow_call:
    inputs:
      enable-harden-runner:
        description: "Whether to install StepSecurity Harden-Runner as the first step."
        required: false
        type: boolean
        default: true

      harden-runner-policy:
        description: "Harden-Runner egress policy: 'audit' (observe + report) or 'block' (deny by default)."
        required: false
        type: string
        default: "audit"

      harden-runner-allowed-endpoints:
        description: "Newline-separated allowed egress endpoints when harden-runner-policy=block. Ignored in audit mode."
        required: false
        type: string
        default: ""

    secrets:
      VERSION_BUMPER_APP_ID:
        description: "GitHub App ID for praetorian-ci-version-bumper"
        required: true
      VERSION_BUMPER_PRIVATE_KEY:
        description: "GitHub App private key for praetorian-ci-version-bumper"
        required: true

permissions:
  contents: read

jobs:
  version-bump:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    concurrency:
      group: version-bump-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}
          disable-sudo-and-containers: true

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.VERSION_BUMPER_APP_ID }}
          private-key: ${{ secrets.VERSION_BUMPER_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine bump level from merged PR
        id: bump
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH=""
          if ! PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].head.ref // empty' 2>&1); then
            echo "::warning::PR lookup failed (${PR_JSON}). Defaulting to patch."
          else
            BRANCH="$PR_JSON"
          fi

          if [ -z "$BRANCH" ]; then
            BRANCH="unknown"
          fi

          if [[ "$BRANCH" == release/* ]]; then
            BUMP="major"
          elif [[ "$BRANCH" == feat/* || "$BRANCH" == feature/* ]]; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "level=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump level: $BUMP (branch: $BRANCH)"

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ steps.bump.outputs.level }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "New version: $NEW_VERSION (was $CURRENT, bump: ${{ steps.bump.outputs.level }})"

          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json

          if [ -f package.json ] && jq -e 'has("version")' package.json >/dev/null 2>&1; then
            jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
            echo "Also bumped package.json to $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          if [ -f package.json ]; then
            git add package.json
          fi
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to $NEW_VERSION"
          git fetch origin main || {
            echo "::error::Failed to fetch origin/main."
            exit 1
          }
          git rebase origin/main || {
            git rebase --abort 2>/dev/null
            echo "::warning::Rebase conflict — skipping bump. Next merge will retry."
            exit 0
          }
          git push origin main
