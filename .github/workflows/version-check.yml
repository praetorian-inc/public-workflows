name: Version Check (Callable)

on:
  workflow_call:
    inputs:
      enable-harden-runner:
        description: "Whether to install StepSecurity Harden-Runner as the first step."
        required: false
        type: boolean
        default: true

      harden-runner-policy:
        description: "Harden-Runner egress policy: 'audit' (observe + report) or 'block' (deny by default)."
        required: false
        type: string
        default: "audit"

      harden-runner-allowed-endpoints:
        description: "Newline-separated allowed egress endpoints when harden-runner-policy=block. Ignored in audit mode."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}
          disable-sudo-and-containers: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check version was bumped
        run: |
          BASE_VERSION=$(git show origin/main:.claude-plugin/plugin.json | jq -r '.version')
          PR_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)

          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::error::plugin.json version not bumped (still $PR_VERSION)."
            echo "::error::The auto-bump may have failed. Add the 'bump' label to retry."
            exit 1
          fi

          echo "Version bumped: $BASE_VERSION -> $PR_VERSION"

          # If the repo also carries a package.json (plugin repos with TS
          # wrappers — sales, marketing, finance, IT, engineering, etc.),
          # enforce parity per Anthropic's claude-plugins-official pattern.
          # Repos without package.json (orator, guard-core, capability tools
          # without TS) are unaffected.
          if [ -f package.json ] && jq -e 'has("version")' package.json >/dev/null 2>&1; then
            PKG_VERSION=$(jq -r '.version' package.json)
            if [ "$PKG_VERSION" != "$PR_VERSION" ]; then
              echo "::error::package.json version ($PKG_VERSION) does not match plugin.json version ($PR_VERSION)."
              echo "::error::Both files must be in sync. The version-bump auto-tool handles this on PR open;"
              echo "::error::if the policy was added after the PR opened, add the 'bump' label to retry, or"
              echo "::error::sync manually by running:"
              echo "::error::  jq --arg v \"$PR_VERSION\" '.version = \$v' package.json > tmp.json && mv tmp.json package.json"
              exit 1
            fi
            echo "package.json version matches plugin.json: $PKG_VERSION"
          fi
