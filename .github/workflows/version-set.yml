name: Set Version (Callable)

on:
  workflow_call:
    inputs:
      version:
        description: "Version number in semver format (e.g. 2.1.4)"
        required: true
        type: string
      create_release:
        description: "Create a GitHub release after tagging"
        required: false
        type: boolean
        default: false

      enable-harden-runner:
        description: "Whether to install StepSecurity Harden-Runner as the first step."
        required: false
        type: boolean
        default: true

      harden-runner-policy:
        description: "Harden-Runner egress policy: 'audit' (observe + report) or 'block' (deny by default)."
        required: false
        type: string
        default: "audit"

      harden-runner-allowed-endpoints:
        description: "Newline-separated allowed egress endpoints when harden-runner-policy=block. Ignored in audit mode."
        required: false
        type: string
        default: ""

    secrets:
      VERSION_BUMPER_APP_ID:
        description: "GitHub App ID for praetorian-ci-version-bumper"
        required: true
      VERSION_BUMPER_PRIVATE_KEY:
        description: "GitHub App private key for praetorian-ci-version-bumper"
        required: true

permissions:
  contents: read

jobs:
  set-version:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must be in semver format (e.g. 2.1.4)"
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.VERSION_BUMPER_APP_ID }}
          private-key: ${{ secrets.VERSION_BUMPER_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set version
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          echo "Setting version to: $NEW_VERSION"
          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "chore: set version to v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Create GitHub release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --generate-notes
